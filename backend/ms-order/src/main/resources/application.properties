# application.properties
# Os valores são injetados via variáveis de ambiente pelo Docker Compose (ou pela pipeline em produção).

spring.application.name=ms-order
server.port=8080

# --- Database Configuration ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations

# --- Redis Configuration ---
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}

# --- AWS Configuration ---
# O endpoint é sobrescrito via variável de ambiente para apontar para o LocalStack
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.credentials.access-key=test
spring.cloud.aws.credentials.secret-key=test

# --- SNS Configuration ---
# O valor do ARN é injetado pela variável de ambiente AWS_SNS_TOPIC_ORDER-EVENTS
aws.sns.topic.order-events=${AWS_SNS_TOPIC_ORDER-EVENTS}