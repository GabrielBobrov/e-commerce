# application-test.properties
# Configurações usadas apenas durante a execução dos testes.

# --- Database Configuration ---
# As propriedades de URL, usuário e senha serão sobrescritas dinamicamente pelo Testcontainers.
# No entanto, precisamos de valores placeholder para o Spring iniciar.
spring.datasource.url=jdbc:postgresql://localhost:5432/testdb
spring.datasource.username=test
spring.datasource.password=test

# --- Redis Configuration ---
# O Testcontainers também irá sobrescrever a porta, mas precisamos de um valor inicial.
spring.data.redis.host=localhost
spring.data.redis.port=6379

# --- AWS Configuration ---
# Aponta para um LocalStack que seria iniciado pelo Testcontainers (se necessário).
# Por enquanto, podemos usar valores dummy.
spring.cloud.aws.endpoint-override=http://localhost:4566
spring.cloud.aws.sqs.endpoint=http://localhost:4566
spring.cloud.aws.sns.endpoint=http://localhost:4566
spring.cloud.aws.credentials.provider=anonymous
aws.sns.topic.order-events=arn:aws:sns:us-east-1:000000000000:test-topic

# Desativa o Flyway nos testes para que o Hibernate possa criar o schema
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
