# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    # Define o diretório de trabalho padrão para todos os comandos 'run'
    defaults:
      run:
        working-directory: ./backend/ms-order

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # O cache do Maven precisa ser configurado para o diretório correto
        cache-dependency-path: backend/ms-order/pom.xml

    - name: Build with Maven
      run: mvn -B clean install --file pom.xml

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
      with:
        # Aponta para o diretório do projeto para que a action encontre o pom.xml
        directory: ./backend/ms-order
        # O token é necessário para a action se comunicar com a API do GitHub
        token: ${{ secrets.GITHUB_TOKEN }}
